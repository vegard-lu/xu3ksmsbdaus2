<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Bilde</title>
    <style>
        /* Sørger for at bakgrunnen er ren og sentrerer bildet */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; /* Lys grå bakgrunn, kan endres til f.eks. #ffffff for hvit */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Stiler bildet så det ikke blir større enn skjermen */
        img {
            max-width: 90%;  /* Bildet vil ta maks 90% av skjermbredden */
            max-height: 90vh; /* Bildet vil ta maks 90% av skjermhøyden */
            height: auto;     /* Beholder de originale proporsjonene */
            width: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); /* Gir en pen, profesjonell skygge rundt bildet */
            border-radius: 4px; /* Gjøre hjørnene ørlite grann avrundet */
        }
    </style>
</head>
<body>

    <img src="image.png" alt="Mitt bilde">

</body>
</html>
