<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banestrekning</title>
    <style>
        /* Fjerner marginer og tvinger siden til å fylle 100% av skjermen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f7;
        }

        /* Container som sikrer at rulling fungerer optimalt på iOS/iPhone */
        .pdf-fullvisning {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Tvinger iframe til å fylle hele containeren */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="pdf-fullvisning">
        <iframe src="test12.pdf"></iframe>
    </div>

</body>
</html>
