<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banestrekning</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch; /* Tvinger frem silkemyk scrolling på iOS */
            background-color: #f5f5f7;
        }

        /* Denne containeren tvinger iOS til å rulle innholdet */
        .pdf-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
        }

        .pdf-viewer {
            width: 100%;
            height: 100%;
            min-height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="pdf-wrapper">
        <!-- <object> fungerer ofte langt bedre enn <iframe> på iOS -->
        <object class="pdf-viewer" data="test12.pdf" type="application/pdf">
            <!-- Fallback hvis alt annet feiler -->
            <iframe class="pdf-viewer" src="test14.pdf"></iframe>
        </object>
    </div>

</body>
</html>    </div>

</body>
</html>
