<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banestrekning</title>
    <style>
        /* Vi setter body og html til å ta høyde, men lar innholdet flyte */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Dette hindrer at siden "spretter" på iPhone */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Containeren må ha en definert høyde for at iframe skal forstå hvor den skal slutte */
        .pdf-container {
            width: 100%;
            height: 100vh; /* 100% av viewport høyde */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <iframe src="test12.pdf" width="100%" height="100%"></iframe>
    </div>

</body>
</html>
